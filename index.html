<!doctype html>
<html lang="pt-BR"> <!-- Cambiado a portugués -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ===== FAVICON COMPLETO ===== -->
    <!-- Favicon básico (siempre funciona) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Favicon para navegadores modernos (PNG) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Apple Touch Icon (iPhone/iPad) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Web App Manifest (PWA) -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- ===== META TAGS MEJORADAS ===== -->
    <title>ST FILMES — Fotografia e Vídeo para Casamentos & Eventos</title>
    <meta name="description" content="ST Filmes - Especialistas em filmagem cinematográfica de casamentos, 15 anos e eventos sociais na Serra Gaúcha. Transforme seus momentos em memórias eternas." />
    <meta name="theme-color" content="#1a1a1a" />
    
    <!-- Open Graph para compartilhamento en redes sociales -->
    <meta property="og:title" content="ST FILMES — Fotografia e Vídeo para Casamentos & Eventos" />
    <meta property="og:description" content="Filmes e Memórias de Casamentos, 15 Anos & Eventos Sociais. Porto Alegre, Canoas, Novo Hamburgo, Gravataí, Gramado, Bento Gonçalves." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sf-filmes.vercel.app/" />
    <meta property="og:image" content="/og-image.jpg" /> <!-- Opcional: imagen para compartir -->
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ST FILMES — Fotografia e Vídeo para Casamentos & Eventos" />
    <meta name="twitter:description" content="Especialistas em filmagem cinematográfica na Serra Gaúcha." />
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
