<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" rx="20" fill="#0a0a0a"/>
  
  <!-- Cuerpo de cámara -->
  <rect x="15" y="28" width="70" height="46" rx="8" fill="#1a1a1a" stroke="#C9A96E" stroke-width="1.5"/>
  
  <!-- Cinta superior (estilo cámara de cine) -->
  <rect x="18" y="24" width="64" height="6" rx="2" fill="#111" stroke="#C9A96E" stroke-width="0.5" opacity="0.6"/>
  <text x="50" y="29" text-anchor="middle" font-family="Courier, monospace" font-size="4.5" font-weight="bold" fill="#C9A96E" opacity="0.5" letter-spacing="2">ST FILMES</text>
  
  <!-- Lente -->
  <circle cx="50" cy="51" r="17" fill="#111" stroke="#C9A96E" stroke-width="1.5"/>
  <circle cx="50" cy="51" r="9" fill="#0a0a0a" stroke="#444" stroke-width="1.5"/>
  <circle cx="50" cy="51" r="3.5" fill="#C9A96E" opacity="0.3"/>
  
  <!-- Flash -->
  <rect x="55" y="20" width="10" height="6" rx="2" fill="#333" stroke="#C9A96E" stroke-width="1"/>
  
  <!-- ST en la base -->
  <text x="50" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#C9A96E" letter-spacing="3">ST</text>
</svg>
